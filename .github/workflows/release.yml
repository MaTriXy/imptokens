name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14                        # Apple Silicon runner
            target: aarch64-apple-darwin
            features: --features metal
            binary: imptokens
            artifact: imptokens-Darwin-arm64

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            features: ""
            binary: imptokens
            artifact: imptokens-Linux-x86_64

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            features: ""
            binary: imptokens.exe
            artifact: imptokens-Windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features }}
        shell: bash

      - name: Stage artifact
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          fail_on_unmatched_files: true
          generate_release_notes: true
